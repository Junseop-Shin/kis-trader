version: '3.9'
services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    environment:
      POSTGRES_DB: kistrader
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - internal
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/kistrader
      - REDIS_URL=redis://redis:6379/0
    env_file: .env
    depends_on:
      - postgres
      - redis
    networks:
      - internal
      - external
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    networks:
      - external
    restart: unless-stopped

  data-collector:
    build: ./data-collector
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/kistrader
    env_file: .env
    depends_on:
      - postgres
    networks:
      - internal
    restart: unless-stopped

  real-trading:
    build: ./real-trading
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/kistrader
    env_file: .env
    depends_on:
      - postgres
    networks:
      - internal
    restart: unless-stopped

  backtest-worker:
    build: ./backtest-worker
    environment:
      - REDIS_URL=redis://redis:6379/0
    env_file: .env
    depends_on:
      - redis
    networks:
      - internal
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - external
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  postgres_data:
