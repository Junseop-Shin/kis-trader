name: Deploy to Windows Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Encode .env content as base64
        id: envenc
        run: |
          ENV=$(printf '%s\n' \
            "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" \
            "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" \
            "KIS_ENCRYPT_KEY=${{ secrets.KIS_ENCRYPT_KEY }}" \
            "INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}" \
            "SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}" \
            "SLACK_CHANNEL=#kis-trader" \
            "REAL_TRADING_URL=http://real-trading:8002" \
            "BACKTEST_WORKER_URL=http://host.docker.internal:8001")
          echo "b64=$(echo "$ENV" | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: Deploy to Windows Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: windows.nuclearbomb6518.com
          username: ylswn
          port: 2222
          key: ${{ secrets.WINDOWS_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            powershell -Command "Write-Host 'Step1: down'; if (Test-Path 'C:\Users\ylswn\Projects\kis-trader') { Set-Location 'C:\Users\ylswn\Projects\kis-trader'; docker compose -f docker-compose.yml -f docker-compose.windows.yml down 2>$null }; Write-Host 'Step1: done'"
            powershell -Command "Write-Host 'Step2: download'; $ProgressPreference='SilentlyContinue'; Invoke-WebRequest 'https://github.com/Junseop-Shin/kis-trader/archive/refs/heads/main.zip' -OutFile 'C:\Users\ylswn\Projects\kis-main.zip'; Write-Host 'Step2: done'"
            powershell -Command "Write-Host 'Step3: extract'; Remove-Item 'C:\Users\ylswn\Projects\kis-trader-main' -Recurse -Force -ErrorAction SilentlyContinue; Expand-Archive 'C:\Users\ylswn\Projects\kis-main.zip' -DestinationPath 'C:\Users\ylswn\Projects\' -Force; Remove-Item 'C:\Users\ylswn\Projects\kis-main.zip'; Write-Host 'Step3: done'"
            powershell -Command "Write-Host 'Step4: rename'; Remove-Item 'C:\Users\ylswn\Projects\kis-trader' -Recurse -Force -ErrorAction SilentlyContinue; Rename-Item 'C:\Users\ylswn\Projects\kis-trader-main' 'C:\Users\ylswn\Projects\kis-trader'; Write-Host 'Step4: done'"
            powershell -Command "Write-Host 'Step5: env'; $b='${{ steps.envenc.outputs.b64 }}'; [IO.File]::WriteAllBytes('C:\Users\ylswn\Projects\kis-trader\.env',[Convert]::FromBase64String($b)); Write-Host 'Step5: done'"
            powershell -Command "Write-Host 'Step6: up'; Set-Location 'C:\Users\ylswn\Projects\kis-trader'; docker compose -f docker-compose.yml -f docker-compose.windows.yml up -d --build redis backend frontend data-collector real-trading backtest-worker; Write-Host 'Deploy done'"
