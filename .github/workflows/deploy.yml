name: Deploy to Windows Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Windows Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: windows.nuclearbomb6518.com
          username: ylswn
          port: 2222
          key: ${{ secrets.WINDOWS_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            powershell -Command "$ProgressPreference='SilentlyContinue'; Invoke-WebRequest 'https://github.com/Junseop-Shin/kis-trader/archive/refs/heads/main.zip' -OutFile 'C:\Users\ylswn\Projects\kis-main.zip' -Headers @{Authorization='token ${{ github.token }}'}"
            powershell -Command "if (Test-Path 'C:\Users\ylswn\Projects\kis-trader-main') { Remove-Item 'C:\Users\ylswn\Projects\kis-trader-main' -Recurse -Force }"
            powershell -Command "Expand-Archive 'C:\Users\ylswn\Projects\kis-main.zip' -DestinationPath 'C:\Users\ylswn\Projects\' -Force"
            powershell -Command "Remove-Item 'C:\Users\ylswn\Projects\kis-main.zip'"
            powershell -Command "if (Test-Path 'C:\Users\ylswn\Projects\kis-trader') { Remove-Item 'C:\Users\ylswn\Projects\kis-trader' -Recurse -Force }"
            powershell -Command "Rename-Item 'C:\Users\ylswn\Projects\kis-trader-main' 'C:\Users\ylswn\Projects\kis-trader'"
            powershell -Command "Set-Content 'C:\Users\ylswn\Projects\kis-trader\.env' 'POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}'"
            powershell -Command "Add-Content 'C:\Users\ylswn\Projects\kis-trader\.env' 'JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}'"
            powershell -Command "Add-Content 'C:\Users\ylswn\Projects\kis-trader\.env' 'KIS_ENCRYPT_KEY=${{ secrets.KIS_ENCRYPT_KEY }}'"
            powershell -Command "Add-Content 'C:\Users\ylswn\Projects\kis-trader\.env' 'INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}'"
            powershell -Command "Add-Content 'C:\Users\ylswn\Projects\kis-trader\.env' 'SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}'"
            powershell -Command "Add-Content 'C:\Users\ylswn\Projects\kis-trader\.env' 'SLACK_CHANNEL=#kis-trader'"
            powershell -Command "Add-Content 'C:\Users\ylswn\Projects\kis-trader\.env' 'REAL_TRADING_URL=http://real-trading:8002'"
            powershell -Command "Add-Content 'C:\Users\ylswn\Projects\kis-trader\.env' 'BACKTEST_WORKER_URL=http://host.docker.internal:8001'"
            powershell -Command "Set-Location 'C:\Users\ylswn\Projects\kis-trader'; docker compose -f docker-compose.yml -f docker-compose.windows.yml up -d --build redis backend frontend data-collector real-trading"
