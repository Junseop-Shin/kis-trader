name: Deploy to Windows Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write .env for Windows
        run: |
          cat > .env << 'ENVEOF'
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          KIS_ENCRYPT_KEY=${{ secrets.KIS_ENCRYPT_KEY }}
          INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}
          SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL=#kis-trader
          REAL_TRADING_URL=http://real-trading:8002
          BACKTEST_WORKER_URL=http://host.docker.internal:8001
          ENVEOF

      - name: Copy files to Windows
        uses: appleboy/scp-action@v0.1.7
        with:
          host: windows.nuclearbomb6518.com
          username: ylswn
          port: 2222
          key: ${{ secrets.WINDOWS_SSH_KEY }}
          source: "."
          target: "C:/Users/ylswn/Projects/kis-trader"
          overwrite: true

      - name: Start containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: windows.nuclearbomb6518.com
          username: ylswn
          port: 2222
          key: ${{ secrets.WINDOWS_SSH_KEY }}
          script: powershell -NoProfile -ExecutionPolicy Bypass -Command "Set-Location 'C:\Users\ylswn\Projects\kis-trader'; docker compose -f docker-compose.yml -f docker-compose.windows.yml up -d --build redis backend frontend data-collector real-trading; Write-Host 'Deploy complete'"
