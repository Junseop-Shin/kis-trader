spring:
  application:
    name: kis-trader-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/kistrader
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  flyway:
    enabled: true
    baseline-on-migrate: true

kis:
  base-url: https://openapi.koreainvestment.com:9443
  appkey: ${KIS_APPKEY}
  appsecret: ${KIS_APPSECRET}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.batch: INFO
