spring:
  config:
    activate:
      on-profile: prod
  datasource:
    # Google Cloud SQL socket factory configuration would go here if using Cloud SQL Proxy or similar
    # For Cloud Run with Cloud SQL Auth Proxy sidecar (standard):
    url: jdbc:postgresql://127.0.0.1:5432/kistrader
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate # Do not auto-update schema in prod
    show-sql: false
  batch:
    job:
      enabled: true

# Cloud Run specific logs usually want JSON format, but keeping simple for now.
logging:
  level:
    root: INFO
