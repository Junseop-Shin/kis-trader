version: '3.9'
services:
  celery-worker:
    build: ./backtest-worker
    environment:
      - REDIS_URL=redis://${WINDOWS_PC_IP}:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@${WINDOWS_PC_IP}:5432/kistrader
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
