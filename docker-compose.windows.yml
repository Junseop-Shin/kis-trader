version: '3.9'
# Windows home server overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.windows.yml up -d --build
#
# Reuses existing techfeed-postgres on host:3104 (TimescaleDB pg15)
# DB: kistrader / User: kistrader
services:
  frontend:
    ports:
      - "3200:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://trader-api.nuclearbomb6518.com

  backend:
    environment:
      - DATABASE_URL=postgresql+asyncpg://kistrader:${POSTGRES_PASSWORD}@host.docker.internal:3104/kistrader
      - CORS_ORIGINS=["https://trader.nuclearbomb6518.com","http://localhost:3000"]
    depends_on:
      - redis

  data-collector:
    environment:
      - DATABASE_URL=postgresql+asyncpg://kistrader:${POSTGRES_PASSWORD}@host.docker.internal:3104/kistrader
    depends_on: []

  real-trading:
    environment:
      - DATABASE_URL=postgresql+asyncpg://kistrader:${POSTGRES_PASSWORD}@host.docker.internal:3104/kistrader
    depends_on: []

  # postgres: replaced with no-op — real DB is techfeed-postgres on host:3104
  postgres:
    image: busybox
    command: ["echo", "using external postgres on host:3104"]
    restart: "no"

  # cloudflared: managed by Windows host tunnel — disabled here
  cloudflared:
    profiles:
      - disabled
